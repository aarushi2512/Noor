name: noor_new
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8
  glassmorphism: ^3.0.0
  animated_bottom_navigation_bar: ^1.4.0
  flutter_animate: ^4.5.2
  cached_network_image: ^3.3.1
  path_drawing: ^1.0.1
  vector_math: ^2.2.0

  # Navigation & Maps
  url_launcher: ^6.3.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  http: ^1.2.1
  flutter_contacts: ^1.1.9+2
  audioplayers: ^6.6.0
  flutter_ringtone_player: ^4.0.0+4
  flutter_polyline_points: ^3.1.0
  mapbox_maps_flutter: ^2.20.1
  mapbox_search: ^4.4.0
  flutter_map_heatmap: ^0.0.8

  # State & Storage
  provider: ^6.1.5+1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  flutter_dotenv: ^5.1.0

  # Permissions & Hardware
  permission_handler: ^11.3.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  battery_plus: ^7.0.0
  vibration: ^3.1.8
  contacts_service_plus: ^0.0.2

  # Notifications & Alarms
  flutter_local_notifications: ^21.0.0
  android_alarm_manager_plus: ^5.0.0
  home_widget: ^0.9.0

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_messaging: ^16.1.3
  cloud_firestore: ^6.2.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/data/emergency_card.json
    - assets/data/mumbai_risk_grid.json
    - assets/tiles/heat/heat_z11.png
    - assets/tiles/heat/heat_z13.png
    - assets/tiles/heat/heat_z15.png
    - assets/data/ncrb_mumbai_crimes.csv
    - assets/images/bg_light.jpeg
    - assets/images/bg_dark.jpeg